<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Fortune Matta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a843;
    --gold-light: #f5d98a;
    --gold-dark: #a07c2a;
    --bg-dark: #0a0a14;
    --bg-panel: #12121f;
    --bg-reel: #0d0d1a;
    --win-glow: rgba(212, 168, 67, 0.6);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #e0d8c8;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(212, 168, 67, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 0%, var(--bg-dark) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .game-container {
    position: relative;
    z-index: 1;
    width: 440px;
    max-width: 96vw;
  }

  .title { text-align: center; margin-bottom: 16px; }
  .title h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark), var(--gold-light));
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(212, 168, 67, 0.3));
    letter-spacing: 2px;
  }
  .title .subtitle {
    font-size: 11px;
    color: rgba(212, 168, 67, 0.5);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .balance-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px;
    background: var(--bg-panel);
    border: 1px solid rgba(212, 168, 67, 0.15);
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .balance-bar .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
  }
  .balance-bar .value {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
    font-variant-numeric: tabular-nums;
  }
  .balance-bar .win-value { color: #5eff8a; transition: transform 0.3s; }
  .balance-bar .win-value.pop { transform: scale(1.3); }

  .machine-frame {
    background: var(--bg-panel);
    border: 2px solid rgba(212, 168, 67, 0.2);
    border-radius: 20px;
    padding: 20px 16px;
    position: relative;
    box-shadow: 0 0 60px rgba(138, 43, 226, 0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .machine-frame::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(212,168,67,0.3), transparent 40%, transparent 60%, rgba(138,43,226,0.2));
    z-index: -1;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    padding: 2px;
  }

  .paylines-label {
    text-align: center;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 12px;
  }
  .paylines-label span { color: var(--gold); }

  .reels-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .reel { display: flex; flex-direction: column; gap: 6px; }

  .cell {
    aspect-ratio: 1;
    background: var(--bg-reel);
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
  }
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04), transparent 60%);
    pointer-events: none;
  }

  .cell .symbol {
    width: 80%;
    height: 80%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .cell .symbol img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    image-rendering: auto;
  }

  .cell.spinning .symbol img {
    animation: slotSpin 0.1s linear infinite;
    filter: blur(2px);
  }

  .cell.win-cell {
    border-color: var(--gold) !important;
    box-shadow: 0 0 20px var(--win-glow), inset 0 0 15px rgba(212, 168, 67, 0.1);
    transform: scale(1.05);
  }
  .cell.wild-cell {
    border-color: rgba(168, 85, 247, 0.7) !important;
    box-shadow: 0 0 25px rgba(168, 85, 247, 0.4), 0 0 50px rgba(168, 85, 247, 0.15);
  }
  .cell.wild-cell::before {
    content: 'WILD';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 8px rgba(168, 85, 247, 0.8);
    z-index: 5;
    letter-spacing: 2px;
  }

  @keyframes slotSpin {
    0% { transform: translateY(-40%); opacity: 0.5; }
    50% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(40%); opacity: 0.5; }
  }

  @keyframes cellReveal {
    0% { transform: scale(0.7) rotateX(20deg); opacity: 0.4; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .cell.revealed .symbol {
    animation: cellReveal 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .win-message {
    text-align: center;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .win-message .msg {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--gold-light), #fff, var(--gold-light));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 1.5s linear infinite;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s;
  }
  .win-message .msg.show { opacity: 1; transform: translateY(0); }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .bet-section {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.03);
    padding: 6px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .bet-section .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
  }
  .bet-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(212, 168, 67, 0.3);
    background: transparent;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .bet-btn:hover { background: rgba(212, 168, 67, 0.1); }
  .bet-btn:active { transform: scale(0.9); }
  .bet-amount {
    font-size: 18px; font-weight: 700;
    color: var(--gold-light);
    min-width: 40px; text-align: center;
  }

  .spin-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    background: linear-gradient(145deg, rgba(212,168,67,0.15), rgba(212,168,67,0.05));
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(212, 168, 67, 0.15);
  }
  .spin-btn:hover:not(:disabled) {
    box-shadow: 0 0 50px rgba(212, 168, 67, 0.3);
    transform: scale(1.05);
    background: linear-gradient(145deg, rgba(212,168,67,0.25), rgba(212,168,67,0.1));
  }
  .spin-btn:active:not(:disabled) { transform: scale(0.95); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spin-btn::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(212, 168, 67, 0.1);
  }

  .max-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid rgba(212, 168, 67, 0.2);
    background: transparent;
    color: rgba(212, 168, 67, 0.6);
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .max-btn:hover { background: rgba(212, 168, 67, 0.1); color: var(--gold-light); }

  .paytable-toggle { text-align: center; margin-top: 14px; }
  .paytable-toggle button {
    background: none; border: none;
    color: rgba(255,255,255,0.25);
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer; transition: color 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .paytable-toggle button:hover { color: rgba(255,255,255,0.5); }

  .paytable {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
  }
  .paytable.open { max-height: 500px; }
  .paytable-inner { padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .pay-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; border-radius: 8px;
    background: rgba(255,255,255,0.02);
  }
  .pay-row .sym { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
  .pay-row .info { font-size: 11px; color: rgba(255,255,255,0.4); }
  .pay-row .mult { margin-left: auto; font-weight: 700; color: var(--gold); font-size: 13px; }
  .pay-row.wild-row {
    grid-column: 1 / -1;
    background: rgba(168, 85, 247, 0.08);
    border: 1px solid rgba(168, 85, 247, 0.15);
  }

  .particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 100; overflow: hidden;
  }
  .particle {
    position: absolute; font-size: 18px;
    animation: particleFall 1.8s ease-in forwards;
    opacity: 0;
  }
  @keyframes particleFall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
  }


  /* ── MASCOT ── */
  .title {
    position: relative;
  }
  .mascot-wrapper {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 0;
    filter: drop-shadow(0 0 20px rgba(212, 168, 67, 0.15));
    opacity: 0.18;
    transition: opacity 0.5s, filter 0.5s;
  }
  .title h1, .title .subtitle {
    position: relative;
    z-index: 1;
  }
  .mascot-wrapper.active {
    opacity: 0.35;
    filter: drop-shadow(0 0 25px rgba(212, 168, 67, 0.3));
  }
  .mascot-wrapper.celebrating {
    opacity: 1;
    filter: drop-shadow(0 0 30px rgba(212, 168, 67, 0.5));
    animation: mascotBounce 0.6s ease-in-out 4;
  }
  .mascot-wrapper.mega {
    opacity: 1;
    filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.6));
    animation: mascotDance 0.4s ease-in-out 8;
  }
  .mascot-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @keyframes mascotBounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-18px) rotate(-8deg); }
    50% { transform: translateY(-5px) rotate(0deg); }
    75% { transform: translateY(-12px) rotate(8deg); }
  }

  @keyframes mascotDance {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    15% { transform: translateY(-20px) rotate(-12deg) scale(1.1); }
    30% { transform: translateY(-5px) rotate(8deg) scale(1.05); }
    50% { transform: translateY(-25px) rotate(-5deg) scale(1.15); }
    70% { transform: translateY(-8px) rotate(10deg) scale(1.05); }
    85% { transform: translateY(-15px) rotate(-8deg) scale(1.1); }
  }


  /* ── VOLUME CONTROL ── */
  .volume-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    margin-top: 10px;
    background: var(--bg-panel);
    border: 1px solid rgba(212, 168, 67, 0.1);
    border-radius: 10px;
  }
  .volume-bar .vol-icon {
    font-size: 16px;
    cursor: pointer;
    color: var(--gold);
    width: 22px;
    text-align: center;
    user-select: none;
    transition: opacity 0.2s;
  }
  .volume-bar .vol-icon:hover { opacity: 0.7; }
  .volume-bar .vol-icon.muted { opacity: 0.3; }
  .volume-bar input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    outline: none;
    cursor: pointer;
  }
  .volume-bar input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg-panel);
    box-shadow: 0 0 8px rgba(212, 168, 67, 0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .volume-bar input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }
  .volume-bar input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg-panel);
    cursor: pointer;
  }
  .volume-bar .vol-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    min-width: 28px;
    text-align: right;
  }
  .music-toggle {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(212, 168, 67, 0.2);
    background: transparent;
    color: rgba(212, 168, 67, 0.5);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
  }
  .music-toggle:hover { background: rgba(212, 168, 67, 0.08); color: var(--gold); }
  .music-toggle.active {
    background: rgba(212, 168, 67, 0.12);
    color: var(--gold-light);
    border-color: rgba(212, 168, 67, 0.4);
  }

  @media (max-width: 440px) {
    .game-container { width: 100%; }
    .title h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="game-container">
  <div class="title">
    <div class="mascot-wrapper" id="mascotWrapper">
      <img src="" id="mascotImg" class="mascot-img" alt="Fortune Matta">
    </div>
    <h1>Fortune Matta</h1>
    <div class="subtitle">Dedada neles</div>
  </div>

  <div class="balance-bar">
    <div>
      <div class="label">Saldo</div>
      <div class="value" id="balance">1.000,00</div>
    </div>
    <div style="text-align:right">
      <div class="label">Ganho</div>
      <div class="value win-value" id="lastWin">0,00</div>
    </div>
  </div>

  <div class="machine-frame">
    <div class="paylines-label">◈ <span>5</span> Linhas de Pagamento ◈</div>
    <div class="reels-container" id="reels"></div>
    <div class="win-message"><div class="msg" id="winMsg"></div></div>
    <div class="controls">
      <div class="bet-section">
        <div class="label">Aposta</div>
        <button class="bet-btn" onclick="changeBet(-1)">−</button>
        <div class="bet-amount" id="betDisplay">5</div>
        <button class="bet-btn" onclick="changeBet(1)">+</button>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">GIRAR</button>
      <button class="max-btn" onclick="maxBet()">MAX</button>
    </div>
  
  <div class="paytable-toggle">
    <button onclick="togglePaytable()">▾ Tabela de Pagamento ▾</button>
  </div>
  <div class="paytable" id="paytable">
    <div class="paytable-inner" id="paytableInner"></div>
  </div>
  <div class="volume-bar">
    <span class="vol-icon" id="volIcon" onclick="toggleMute()">🔊</span>
    <input type="range" id="volSlider" min="0" max="100" value="40" oninput="setVolume(this.value)">
    <span class="vol-label" id="volLabel">40%</span>
    <button class="music-toggle" id="musicToggle" onclick="toggleMusic()">♫ Música</button>
  </div>

</div>

// ── SYMBOLS ──
const SYMBOLS = [
  { id: 'wild',    img: IMG_DATA.matta2, name: 'Wild',      wild: true,  weight: 4,  pay3: 50 },
  { id: 'sym1',    img: IMG_DATA.matta1, name: 'Matta 1',   wild: false, weight: 8,  pay3: 25 },
  { id: 'sym3',    img: IMG_DATA.matta3, name: 'Matta 3',   wild: false, weight: 10, pay3: 20 },
  { id: 'sym4',    img: IMG_DATA.matta4, name: 'Matta 4',   wild: false, weight: 10, pay3: 15 },
  { id: 'sym5',    img: IMG_DATA.matta5, name: 'Matta 5',   wild: false, weight: 14, pay3: 10 },
  { id: 'sym6',    img: IMG_DATA.matta6, name: 'Matta 6',   wild: false, weight: 16, pay3: 8  },
  { id: 'sym7',    img: IMG_DATA.matta7, name: 'Matta 7',   wild: false, weight: 18, pay3: 5  },
  { id: 'sym8',    img: IMG_DATA.matta8, name: 'Matta 8',   wild: false, weight: 20, pay3: 3  },
];

const TOTAL_WEIGHT = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);

let balance = 1000, bet = 5, lastWin = 0, spinning = false, grid = [];
const BET_STEPS = [1, 2, 5, 10, 20, 50, 100];
let betIndex = 2;

const PAYLINES = [
  [[0,0],[0,1],[0,2]],
  [[1,0],[1,1],[1,2]],
  [[2,0],[2,1],[2,2]],
  [[0,0],[1,1],[2,2]],
  [[2,0],[1,1],[0,2]],
];

function init() {
  document.getElementById('mascotImg').src = MASCOT_IMG;
  buildGrid();
  renderPaytable();
  randomFill();
  renderGrid();
  updateUI();
}

function buildGrid() {
  const reelsEl = document.getElementById('reels');
  reelsEl.innerHTML = '';
  for (let col = 0; col < 3; col++) {
    const reel = document.createElement('div');
    reel.className = 'reel';
    for (let row = 0; row < 3; row++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${row}-${col}`;
      cell.innerHTML = '<div class="symbol"><img src="" alt=""></div>';
      reel.appendChild(cell);
    }
    reelsEl.appendChild(reel);
  }
}

function pickSymbol() {
  let r = Math.random() * TOTAL_WEIGHT;
  for (const sym of SYMBOLS) { r -= sym.weight; if (r <= 0) return sym; }
  return SYMBOLS[SYMBOLS.length - 1];
}

function randomFill() {
  grid = [];
  for (let row = 0; row < 3; row++) {
    grid[row] = [];
    for (let col = 0; col < 3; col++) grid[row][col] = pickSymbol();
  }
}

function renderGrid() {
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const cell = document.getElementById(`cell-${row}-${col}`);
      cell.querySelector('.symbol img').src = grid[row][col].img;
      cell.classList.remove('win-cell', 'wild-cell', 'spinning', 'revealed');
    }
  }
}

async function spin() {
  if (spinning || balance < bet) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  hideWinMsg();
  clearWinCells();

  balance -= bet;
  lastWin = 0;
  updateUI();

  playSpinSound();

  for (let col = 0; col < 3; col++)
    for (let row = 0; row < 3; row++)
      document.getElementById(`cell-${row}-${col}`).classList.add('spinning');

  const intervalId = setInterval(() => {
    for (let row = 0; row < 3; row++)
      for (let col = 0; col < 3; col++)
        document.getElementById(`cell-${row}-${col}`).querySelector('.symbol img').src =
          SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].img;
  }, 100);

  randomFill();

  await sleep(600);
  clearInterval(intervalId);

  for (let col = 0; col < 3; col++) {
    await sleep(280);
    playReelStop(col);
    for (let row = 0; row < 3; row++) {
      const cell = document.getElementById(`cell-${row}-${col}`);
      cell.classList.remove('spinning');
      cell.querySelector('.symbol img').src = grid[row][col].img;
      cell.classList.add('revealed');
    }
  }

  await sleep(200);

  let totalWin = 0;
  const winCells = new Set(), wildCells = new Set();

  for (const line of PAYLINES) {
    const syms = line.map(([r, c]) => grid[r][c]);
    const result = evaluateLine(syms);
    if (result) {
      totalWin += result.payout;
      line.forEach(([r, c]) => {
        winCells.add(`${r}-${c}`);
        if (grid[r][c].wild) wildCells.add(`${r}-${c}`);
      });
    }
  }

  if (totalWin > 0) {
    lastWin = totalWin * bet;
    balance += lastWin;
    updateUI();

    winCells.forEach(key => document.getElementById(`cell-${key}`).classList.add('win-cell'));
    wildCells.forEach(key => document.getElementById(`cell-${key}`).classList.add('wild-cell'));

    document.getElementById('lastWin').classList.add('pop');
    setTimeout(() => document.getElementById('lastWin').classList.remove('pop'), 300);

    if (lastWin >= bet * 30) { showWinMsg('✦ MEGA WIN ✦'); spawnParticles(30); animateMascot('mega'); playMegaWinSound(); }
    else if (lastWin >= bet * 10) { showWinMsg('★ GRANDE GANHO ★'); spawnParticles(15); animateMascot('celebrating'); playBigWinSound(); }
    else { showWinMsg(`GANHOU ${formatMoney(lastWin)}!`); spawnParticles(6); animateMascot('celebrating'); playWinSound(); }
  }

  spinning = false;
  document.getElementById('spinBtn').disabled = false;
}

function evaluateLine(syms) {
  const nonWild = syms.filter(s => !s.wild);
  if (nonWild.length === 0) return { payout: SYMBOLS[0].pay3 };
  const baseId = nonWild[0].id;
  if (nonWild.every(s => s.id === baseId)) return { payout: nonWild[0].pay3 };
  return null;
}

function changeBet(dir) {
  playButtonClick();
  betIndex = Math.max(0, Math.min(BET_STEPS.length - 1, betIndex + dir));
  bet = BET_STEPS[betIndex];
  document.getElementById('betDisplay').textContent = bet;
}

function maxBet() {
  playButtonClick();
  betIndex = BET_STEPS.length - 1;
  while (betIndex > 0 && BET_STEPS[betIndex] > balance) betIndex--;
  bet = BET_STEPS[betIndex];
  document.getElementById('betDisplay').textContent = bet;
}

function formatMoney(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function updateUI() {
  document.getElementById('balance').textContent = formatMoney(balance);
  document.getElementById('lastWin').textContent = formatMoney(lastWin);
}
function showWinMsg(text) { const el = document.getElementById('winMsg'); el.textContent = text; el.classList.add('show'); }
function hideWinMsg() { document.getElementById('winMsg').classList.remove('show'); }
function clearWinCells() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('win-cell', 'wild-cell')); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function spawnParticles(count) {

function animateMascot(type) {
  const wrapper = document.getElementById('mascotWrapper');
  wrapper.classList.remove('active', 'celebrating', 'mega');

  wrapper.classList.add(type);

// ══════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API - all synthesized)
// ══════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let sfxGain = null;
let musicPlaying = false;
let musicNodes = [];
let isMuted = false;
let currentVolume = 0.4;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = currentVolume;
  masterGain.connect(audioCtx.destination);

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.25;
  musicGain.connect(masterGain);

  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.7;
  sfxGain.connect(masterGain);
}

function ensureAudio() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function setVolume(val) {
  currentVolume = val / 100;
  document.getElementById('volLabel').textContent = val + '%';
  if (masterGain) masterGain.gain.value = currentVolume;
  if (val == 0) {
    document.getElementById('volIcon').textContent = '🔇';
    document.getElementById('volIcon').classList.add('muted');
  } else {
    document.getElementById('volIcon').textContent = val < 50 ? '🔉' : '🔊';
    document.getElementById('volIcon').classList.remove('muted');
    isMuted = false;
  }
}

function toggleMute() {
  ensureAudio();
  if (isMuted) {
    isMuted = false;
    masterGain.gain.value = currentVolume;
    document.getElementById('volIcon').textContent = '🔊';
    document.getElementById('volIcon').classList.remove('muted');
  } else {
    isMuted = true;
    masterGain.gain.value = 0;
    document.getElementById('volIcon').textContent = '🔇';
    document.getElementById('volIcon').classList.add('muted');
  }
}

// ── MUSIC (looping casino groove) ──
function toggleMusic() {
  ensureAudio();
  const btn = document.getElementById('musicToggle');
  if (musicPlaying) {
    stopMusic();
    btn.classList.remove('active');
    btn.textContent = '♫ Música';
  } else {
    startMusic();
    btn.classList.add('active');
    btn.textContent = '■ Parar';
  }
}

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  playMusicLoop();
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

function playMusicLoop() {
  if (!musicPlaying || !audioCtx) return;
  const t = audioCtx.currentTime;
  const bpm = 115;
  const beat = 60 / bpm;
  const bar = beat * 4;
  const loopLen = bar * 4;

  // Bass line (pentatonic groove)
  const bassNotes = [
    [130.81, 0], [130.81, beat], [164.81, beat*2], [146.83, beat*3],
    [130.81, bar], [164.81, bar+beat], [174.61, bar+beat*2], [146.83, bar+beat*3],
    [116.54, bar*2], [130.81, bar*2+beat], [146.83, bar*2+beat*2], [130.81, bar*2+beat*3],
    [116.54, bar*3], [130.81, bar*3+beat], [146.83, bar*3+beat*2], [130.81, bar*3+beat*3],
  ];
  bassNotes.forEach(([freq, offset]) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.35, t + offset);
    g.gain.exponentialRampToValueAtTime(0.01, t + offset + beat * 0.85);
    osc.connect(g);
    g.connect(musicGain);
    osc.start(t + offset);
    osc.stop(t + offset + beat * 0.9);
    musicNodes.push(osc);
  });

  // Hi-hat pattern
  for (let i = 0; i < 16; i++) {
    const offset = i * beat;
    const isAccent = i % 2 === 0;
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let s = 0; s < data.length; s++) data[s] = (Math.random() * 2 - 1) * (1 - s/data.length);
    noise.buffer = buf;
    const hg = audioCtx.createGain();
    hg.gain.value = isAccent ? 0.12 : 0.05;
    const hf = audioCtx.createBiquadFilter();
    hf.type = 'highpass';
    hf.frequency.value = 8000;
    noise.connect(hf);
    hf.connect(hg);
    hg.connect(musicGain);
    noise.start(t + offset);
    musicNodes.push(noise);
  }

  // Chords (soft pads)
  const chords = [
    [[261.63, 329.63, 392.00], 0, bar * 2],
    [[233.08, 293.66, 349.23], bar * 2, bar * 2],
  ];
  chords.forEach(([freqs, offset, dur]) => {
    freqs.forEach(freq => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t + offset);
      g.gain.linearRampToValueAtTime(0.06, t + offset + 0.3);
      g.gain.linearRampToValueAtTime(0.04, t + offset + dur - 0.2);
      g.gain.linearRampToValueAtTime(0, t + offset + dur);
      osc.connect(g);
      g.connect(musicGain);
      osc.start(t + offset);
      osc.stop(t + offset + dur + 0.01);
      musicNodes.push(osc);
    });
  });

  // Schedule next loop
  const loopTimer = setTimeout(() => {
    musicNodes = [];
    playMusicLoop();
  }, loopLen * 1000 - 50);
  musicNodes.push({ stop: () => clearTimeout(loopTimer) });
}

// ── SFX SOUNDS ──
function playSpinSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // Rapid rising swoosh
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.15);
  osc.frequency.exponentialRampToValueAtTime(100, t + 0.6);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(t);
  osc.stop(t + 0.65);

  // Noise whoosh
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  noise.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.08, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  const nf = audioCtx.createBiquadFilter();
  nf.type = 'bandpass';
  nf.frequency.value = 1200;
  nf.Q.value = 2;
  noise.connect(nf);
  nf.connect(ng);
  ng.connect(sfxGain);
  noise.start(t);
}

function playReelStop(colIndex) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const freq = 220 + colIndex * 80;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + 0.12);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(t);
  osc.stop(t + 0.18);

  // Thud
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(80, t);
  osc2.frequency.exponentialRampToValueAtTime(40, t + 0.08);
  g2.gain.setValueAtTime(0.3, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc2.connect(g2);
  g2.connect(sfxGain);
  osc2.start(t);
  osc2.stop(t + 0.12);
}

function playWinSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // Ascending arpeggio
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const start = t + i * 0.1;
    g.gain.setValueAtTime(0.12, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
    osc.connect(g);
    g.connect(sfxGain);
    osc.start(start);
    osc.stop(start + 0.28);
  });
  // Shimmer
  [1318.5, 1567.98].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = t + 0.4 + i * 0.08;
    g.gain.setValueAtTime(0.08, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
    osc.connect(g);
    g.connect(sfxGain);
    osc.start(start);
    osc.stop(start + 0.45);
  });
}

function playBigWinSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // Fanfare
  const fanfare = [
    [523.25, 0, 0.15], [659.25, 0.15, 0.15], [783.99, 0.3, 0.15],
    [1046.50, 0.5, 0.3], [783.99, 0.85, 0.1], [1046.50, 1.0, 0.5],
  ];
  fanfare.forEach(([freq, offset, dur]) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.12, t + offset);
    g.gain.setValueAtTime(0.12, t + offset + dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t + offset + dur);
    osc.connect(g);
    g.connect(sfxGain);
    osc.start(t + offset);
    osc.stop(t + offset + dur + 0.01);
  });
  // Coin shower
  for (let i = 0; i < 12; i++) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 2000 + Math.random() * 3000;
    const start = t + 0.5 + Math.random() * 1.2;
    g.gain.setValueAtTime(0.06, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.08);
    osc.connect(g);
    g.connect(sfxGain);
    osc.start(start);
    osc.stop(start + 0.1);
  }
}

function playMegaWinSound() {
  ensureAudio();
  playBigWinSound();
  const t = audioCtx.currentTime;
  // Extra epic layer
  setTimeout(() => {
    if (!audioCtx) return;
    const t2 = audioCtx.currentTime;
    const epic = [
      [1046.50, 0, 0.2], [1318.5, 0.2, 0.2], [1567.98, 0.4, 0.4],
      [2093.0, 0.9, 0.6]
    ];
    epic.forEach(([freq, offset, dur]) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.1, t2 + offset);
      g.gain.exponentialRampToValueAtTime(0.001, t2 + offset + dur);
      osc.connect(g);
      g.connect(sfxGain);
      osc.start(t2 + offset);
      osc.stop(t2 + offset + dur + 0.01);
    });
    // More coins!
    for (let i = 0; i < 20; i++) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 2500 + Math.random() * 4000;
      const start = t2 + Math.random() * 1.5;
      g.gain.setValueAtTime(0.05, start);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.06);
      osc.connect(g);
      g.connect(sfxGain);
      osc.start(start);
      osc.stop(start + 0.08);
    }
  }, 1200);
}

function playButtonClick() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.05);
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(t);
  osc.stop(t + 0.08);
}
